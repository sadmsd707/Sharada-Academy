<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f8fafc" />
  <title>Sharada Academy – Announcements</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --safe-area-top: env(safe-area-inset-top, 0px);
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
      --safe-area-left: env(safe-area-inset-left, 0px);
      --safe-area-right: env(safe-area-inset-right, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: #f8fafc;
      color: #475569;
      line-height: 1.6;
      overflow-x: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-top: var(--safe-area-top);
      padding-bottom: var(--safe-area-bottom);
      padding-left: var(--safe-area-left);
      padding-right: var(--safe-area-right);
      position: relative;
    }

    #equations-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      z-index: 0;
      pointer-events: none;
      display: block;
      will-change: transform;
    }

    .content-layer {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      width: 100%;
    }

    /* ---------- Glass Header ---------- */
    .app-header {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(203, 213, 225, 0.4);
      height: 70px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .header-logo {
      display: flex;
      align-items: baseline;
      gap: 4px;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .header-logo .logo-pink {
      color: #db2777;
    }

    .header-logo .logo-light {
      color: #94a3b8;
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
    }

    .hamburger {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 28px;
      height: 20px;
      padding: 0;
      z-index: 1001;
      position: relative;
      transition: transform 0.2s ease;
    }

    .hamburger span {
      display: block;
      height: 3px;
      width: 100%;
      background-color: #db2777;
      border-radius: 3px;
      transition: all 0.3s ease;
      transform-origin: center;
    }

    .hamburger.active span:nth-child(1) {
      transform: translateY(8.5px) rotate(45deg);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }

    .hamburger.active span:nth-child(3) {
      transform: translateY(-8.5px) rotate(-45deg);
    }

    .hamburger:active {
      transform: scale(0.92);
    }

    /* ---------- Side Navigation ---------- */
    .side-nav {
      position: fixed;
      top: 0;
      right: -320px;
      width: 300px;
      height: 100vh;
      height: 100dvh;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: -8px 0 32px rgba(0, 0, 0, 0.08);
      border-left: 1px solid rgba(203, 213, 225, 0.5);
      transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
      display: flex;
      flex-direction: column;
    }

    .side-nav.active {
      right: 0;
    }

    .side-nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
      flex: 1;
      overflow-y: auto;
      max-height: 100vh;
      max-height: 100dvh;
      padding-top: 80px;
      padding-bottom: 24px;
    }

    .side-nav ul::-webkit-scrollbar {
      width: 4px;
    }

    .side-nav ul::-webkit-scrollbar-track {
      background: transparent;
    }

    .side-nav ul::-webkit-scrollbar-thumb {
      background: rgba(219, 39, 119, 0.2);
      border-radius: 4px;
    }

    .side-nav ul li a {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #1e293b;
      text-decoration: none;
      padding: 16px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      border-left: 4px solid transparent;
      transition: all 0.25s ease;
      background: transparent;
      margin: 0;
    }

    .side-nav ul li a:hover {
      background: rgba(219, 39, 119, 0.05);
      border-left-color: #db2777;
      color: #db2777;
      padding-left: 32px;
    }

    .side-nav ul li a.nav-active {
      background: rgba(219, 39, 119, 0.06) !important;
      border-left: 4px solid #db2777 !important;
      color: #db2777 !important;
      padding-left: 32px !important;
    }

    .nav-icon {
      font-size: 1.1rem;
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: 999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.35s ease;
    }

    .overlay.active {
      opacity: 1;
      visibility: visible;
    }

    /* ---------- Main Layout ---------- */
    .main-content {
      padding: 24px 5vw 32px;
      max-width: 1200px;
      margin: auto;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ---------- Glass Cards ---------- */
    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 1px solid rgba(203, 213, 225, 0.5);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
      padding: 28px 24px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .page-header {
      background: rgba(252, 231, 243, 0.7);
      border: 1px solid rgba(219, 39, 119, 0.2);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      margin-bottom: 0;
    }

    .page-header h2 {
      color: #1e293b;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .page-header p {
      color: #64748b;
      font-size: 1.1rem;
      font-weight: 500;
    }

    .announcements-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .announcement-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(203, 213, 225, 0.5);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .announcement-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.08);
    }

    .announcement-header {
      padding: 24px;
      color: white;
      position: relative;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #db2777, #e11d48);
    }

    .announcement-header.priority-high {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    .announcement-header.priority-medium {
      background: linear-gradient(135deg, #f59e0b, #d97706);
    }

    .announcement-header.priority-low {
      background: linear-gradient(135deg, #10b981, #059669);
    }

    .announcement-category-container {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
    }

    .announcement-category {
      background: rgba(255, 255, 255, 0.2);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .announcement-date {
      font-size: 0.85rem;
      background: rgba(255, 255, 255, 0.15);
      padding: 5px 14px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .announcement-title {
      font-size: 1.3rem;
      font-weight: 800;
      line-height: 1.3;
      margin-top: auto;
    }

    .announcement-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    .announcement-priority {
      background: rgba(255, 255, 255, 0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 700;
    }

    .announcement-body {
      padding: 24px;
    }

    .announcement-content {
      color: #475569;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .announcement-attachments {
      border-top: 1px solid #e2e8f0;
      padding-top: 20px;
      margin-top: 20px;
    }

    .attachments-title {
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .attachment-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(248, 250, 252, 0.7);
      border-radius: 12px;
      transition: background 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .attachment-item:hover {
      background: rgba(219, 39, 119, 0.05);
    }

    /* ---------- Buttons ---------- */
    .btn {
      background: linear-gradient(135deg, #db2777, #e11d48);
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      text-align: center;
      font-size: 0.95rem;
      min-height: 48px;
      box-shadow: 0 8px 24px rgba(219, 39, 119, 0.2);
      letter-spacing: 0.01em;
      gap: 6px;
    }

    .btn:hover {
      box-shadow: 0 12px 28px rgba(219, 39, 119, 0.3);
      background: linear-gradient(135deg, #c71d6b, #d41a3f);
    }

    .btn:active {
      transform: scale(0.96);
      background: linear-gradient(135deg, #b3185e, #c41636);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #db2777;
      color: #db2777;
      box-shadow: none;
    }

    .btn-outline:hover {
      background: #db2777;
      color: white;
    }

    .load-more {
      text-align: center;
      margin-top: 30px;
    }

    /* ---------- Footer ---------- */
    .site-footer {
      border-top: 1px solid #e2e8f0;
      padding-top: 20px;
      margin-top: auto;
      text-align: center;
      width: 100%;
      padding-bottom: 16px;
    }

    .site-footer .copyright {
      font-size: 0.875rem;
      font-weight: 700;
      color: #1e293b;
    }

    .site-footer .love {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-weight: 700;
      margin-top: 4px;
    }

    /* ---------- Notifications ---------- */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 20px;
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
      z-index: 9999;
      animation: slideIn 0.35s ease, fadeOut 0.3s ease 2.8s forwards;
      min-width: 280px;
      max-width: 400px;
      color: white;
      font-weight: 600;
    }

    .notification-success { background: #10b981; }
    .notification-error { background: #ef4444; }
    .notification-info { background: #3b82f6; }

    #loadingOverlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.9);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; z-index: 9999;
      font-size: 1.2rem; color: #db2777; font-weight: 600;
    }

    .spinner {
      border: 3px solid #e2e8f0;
      border-top: 3px solid #db2777;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideIn { from { transform: translateX(120px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }

    @media (max-width: 768px) {
      .app-header {
        padding: 12px 18px;
        height: 62px;
      }
      .header-logo { font-size: 1.3rem; }
      .side-nav { width: 280px; right: -290px; }
      .announcements-grid { grid-template-columns: 1fr; }
      .page-header h2 { font-size: 1.6rem; }
    }
  </style>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBXWEuA7G55nawfNUoIqr9PqGP9YGQwGnc",
      authDomain: "soham-6d886.firebaseapp.com",
      projectId: "soham-6d886",
      storageBucket: "soham-6d886.firebasestorage.app",
      messagingSenderId: "281780176229",
      appId: "1:281780176229:web:cd1eea7bd171c14a338d8c",
      measurementId: "G-CB1J6LQ7DJ"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let allAnnouncements = [];
    let visibleAnnouncements = 4;

    // Authentication check removed – page now accessible without login

    document.getElementById("logoutBtn").addEventListener("click", async (e) => {
      e.preventDefault();
      if (auth.currentUser) {
        await auth.signOut();
      }
      localStorage.removeItem("isLoggedIn");
      localStorage.removeItem("userRole");
      localStorage.removeItem("currentParent");
      window.location.href = "../role-selection.html";
    });

    const hamburger = document.getElementById('hamburger');
    const sideNav = document.getElementById('sideNav');
    const overlay = document.getElementById('overlay');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('active');
      sideNav.classList.toggle('active');
      overlay.classList.toggle('active');
      document.body.style.overflow = sideNav.classList.contains('active') ? 'hidden' : 'auto';
    });
    overlay.addEventListener('click', () => {
      hamburger.classList.remove('active');
      sideNav.classList.remove('active');
      overlay.classList.remove('active');
      document.body.style.overflow = 'auto';
    });
    document.querySelectorAll('.side-nav a').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('active');
        sideNav.classList.remove('active');
        overlay.classList.remove('active');
        document.body.style.overflow = 'auto';
      });
    });

    async function loadAnnouncements() {
      try {
        document.getElementById("loadingOverlay").style.display = "flex";
        const snapshot = await db.collection("announcements")
          .orderBy("date", "desc")
          .get();

        allAnnouncements = [];
        snapshot.forEach(doc => {
          allAnnouncements.push({ id: doc.id, ...doc.data() });
        });

        document.getElementById("loadingOverlay").style.display = "none";
        visibleAnnouncements = 4;
        renderAnnouncements();
      } catch (error) {
        console.error("Error loading announcements:", error);
        document.getElementById("loadingOverlay").style.display = "none";
        showNotification("Failed to load announcements", "error");
      }
    }

    function formatDate(dateValue) {
      if (!dateValue) return '';
      const date = dateValue.toDate ? dateValue.toDate() : new Date(dateValue);
      return date.toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric'
      });
    }

    function getPriorityClass(priority) {
      switch (priority) {
        case 'high': return 'priority-high';
        case 'medium': return 'priority-medium';
        case 'low': return 'priority-low';
        default: return '';
      }
    }

    function getPriorityText(priority) {
      switch (priority) {
        case 'high': return 'High Priority';
        case 'medium': return 'Medium Priority';
        case 'low': return 'Low Priority';
        default: return 'Priority';
      }
    }

    function renderAnnouncements() {
      const grid = document.getElementById('announcementsGrid');
      grid.innerHTML = '';

      const announcementsToShow = allAnnouncements.slice(0, visibleAnnouncements);

      if (announcementsToShow.length === 0) {
        grid.innerHTML = `
          <div class="no-results" style="grid-column:1/-1; text-align:center; padding:50px;">
            <div class="no-results-icon">📭</div>
            <h3 style="color:#1e293b;">No announcements found</h3>
            <p style="color:#64748b;">Check back later for new announcements</p>
          </div>
        `;
        document.getElementById('loadMoreBtn').style.display = 'none';
        return;
      }

      announcementsToShow.forEach((announcement, index) => {
        const card = document.createElement('div');
        card.className = 'announcement-card';
        card.style.animationDelay = `${0.1 * (index + 1)}s`;

        const priorityClass = getPriorityClass(announcement.priority || 'low');
        const attachments = announcement.attachments || [];

        card.innerHTML = `
          <div class="announcement-header ${priorityClass}">
            <div class="announcement-category-container">
              <div class="announcement-category">${announcement.category || 'General'}</div>
              <div class="announcement-date">
                <span>📅</span> ${formatDate(announcement.date)}
              </div>
            </div>
            <div class="announcement-title">${announcement.title || 'Untitled'}</div>
            <div class="announcement-meta">
              <div class="announcement-sender">
                <span>👨‍🏫</span> ${announcement.sender || 'Sharada Admin'}
              </div>
              <div class="announcement-priority">${getPriorityText(announcement.priority)}</div>
            </div>
          </div>
          <div class="announcement-body">
            <div class="announcement-content">
              <p>${announcement.content || ''}</p>
            </div>
            ${attachments.length > 0 ? `
            <div class="announcement-attachments">
              <div class="attachments-title">
                <span>📎</span> Attachments
              </div>
              <div class="attachment-list">
                ${attachments.map(att => `
                  <a href="#" class="attachment-item" onclick="downloadAttachment('${att.name}')">
                    <span class="attachment-icon">📄</span>
                    <span class="attachment-name">${att.name}</span>
                    <span class="attachment-size">${att.size || ''}</span>
                  </a>
                `).join('')}
              </div>
            </div>
            ` : ''}
          </div>
        `;
        grid.appendChild(card);
      });

      document.getElementById('loadMoreBtn').style.display =
        visibleAnnouncements >= allAnnouncements.length ? 'none' : 'block';
    }

    document.getElementById('loadMoreBtn').addEventListener('click', () => {
      visibleAnnouncements += 4;
      renderAnnouncements();
    });

    function downloadAttachment(filename) {
      event.preventDefault();
      showNotification(`Downloading "${filename}"...`, 'success');
    }

    function showNotification(message, type = 'info') {
      const existing = document.querySelector('.notification');
      if (existing) existing.remove();
      const el = document.createElement('div');
      el.className = `notification notification-${type}`;
      el.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span>${message}</span>
          <button style="background:none;border:none;color:white;font-size:1.2rem;cursor:pointer;" onclick="this.parentElement.parentElement.remove()">×</button>
        </div>
      `;
      document.body.appendChild(el);
      setTimeout(() => { if (el.parentNode) el.remove(); }, 3000);
    }

    loadAnnouncements();

    (function() {
      const canvas = document.getElementById('equations-canvas');
      const ctx = canvas.getContext('2d');

      let width, height;
      let dpr = Math.min(window.devicePixelRatio || 1, 2);
      let isMobile = false;
      let particleCount;
      let baseSizeMultiplier;

      function detectMobile() {
        const w = window.innerWidth;
        isMobile = w <= 768;
        if (w <= 380) {
          particleCount = 18;
          baseSizeMultiplier = 0.55;
        } else if (w <= 480) {
          particleCount = 24;
          baseSizeMultiplier = 0.65;
        } else if (w <= 768) {
          particleCount = 32;
          baseSizeMultiplier = 0.78;
        } else if (w <= 1024) {
          particleCount = 40;
          baseSizeMultiplier = 0.9;
        } else {
          particleCount = 48;
          baseSizeMultiplier = 1.0;
        }
      }

      function resizeCanvas() {
        detectMobile();
        dpr = Math.min(window.devicePixelRatio || 1, isMobile ? 2 : 2);
        width = canvas.width = window.innerWidth * dpr;
        height = canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
      }

      window.addEventListener('resize', resizeCanvas);
      window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 300));
      resizeCanvas();

      const expressions = [
        "E = mc²", "∫ x² dx", "∇ × B = μ₀J", "PV = nRT",
        "sin²θ + cos²θ = 1", "H₂O + CO₂ → C₆H₁₂O₆", "ΔG = ΔH - TΔS",
        "F = G(m₁m₂)/r²", "pH = -log[H⁺]", "DNA ⇌ RNA",
        "Fe²⁺ + e⁻ → Fe", "λ = h/p", "v = u + at", "C₆H₁₂O₆",
        "∑ F = ma", "lim (x→0) sin(x)/x = 1", "ATP → ADP + Pi",
        "Krebs Cycle", "dψ/dt", "K_a = [H⁺][A⁻]/[HA]", "y = mx + c",
      ];

      function drawBenzene(ctx, x, y, size) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const angle = (Math.PI / 3) * i;
          const nextX = x + size * Math.cos(angle);
          const nextY = y + size * Math.sin(angle);
          if (i === 0) ctx.moveTo(nextX, nextY);
          else ctx.lineTo(nextX, nextY);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(x, y, size * 0.6, 0, Math.PI * 2);
        ctx.stroke();
      }

      class ScienceParticle {
        constructor() {
          this.reset();
          this.y = Math.random() * (window.innerHeight || 800);
        }

        reset() {
          this.type = Math.random() < 0.7 ? 'text' : 'chemistry';
          this.text = expressions[Math.floor(Math.random() * expressions.length)];
          this.x = Math.random() * (window.innerWidth || 400);
          this.y = -60;
          this.speed = 0.15 + Math.random() * 0.45;
          this.size = (10 + Math.floor(Math.random() * 14)) * baseSizeMultiplier;
          this.opacity = 0.12 + Math.random() * 0.15;
        }

        update(screenW, screenH) {
          this.y += this.speed;
          if (this.y > screenH + 60) {
            this.reset();
            this.y = -60;
            this.x = Math.random() * screenW;
          }
        }

        draw(ctx) {
          ctx.save();
          ctx.strokeStyle = `rgba(157, 23, 77, ${this.opacity})`;
          ctx.fillStyle = `rgba(157, 23, 77, ${this.opacity})`;
          ctx.lineWidth = Math.max(1.2, 1.8 * baseSizeMultiplier);

          if (this.type === 'text') {
            ctx.font = `bold ${this.size}px 'Courier New', monospace`;
            ctx.fillText(this.text, this.x, this.y);
          } else if (this.type === 'chemistry') {
            drawBenzene(ctx, this.x, this.y, this.size * 1.2);
          }
          ctx.restore();
        }
      }

      let particles = [];
      function initParticles() {
        particles = [];
        for (let i = 0; i < particleCount; i++) {
          const p = new ScienceParticle();
          p.y = (window.innerHeight / particleCount) * i - 60 + Math.random() * 40;
          particles.push(p);
        }
      }

      initParticles();

      let animFrameId;
      function animateCanvas() {
        const screenW = window.innerWidth;
        const screenH = window.innerHeight;
        ctx.clearRect(0, 0, screenW, screenH);
        for (let i = 0; i < particles.length; i++) {
          particles[i].update(screenW, screenH);
          particles[i].draw(ctx);
        }
        animFrameId = requestAnimationFrame(animateCanvas);
      }

      document.addEventListener('visibilitychange', () => {
        if (document.hidden && animFrameId) {
          cancelAnimationFrame(animFrameId);
          animFrameId = null;
        } else if (!document.hidden && !animFrameId) {
          animFrameId = requestAnimationFrame(animateCanvas);
        }
      });

      animateCanvas();

      let resizeTimeout;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          resizeCanvas();
          initParticles();
        }, 250);
      });
    })();
  </script>
</body>
</html>
