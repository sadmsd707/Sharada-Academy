<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Biology Stream - Soham</title>
  
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #e0f2fe, #f8fafc);
      color: #333;
      margin: 0;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    nav ul {
      display: flex;
      gap: 20px;
      list-style: none;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: 500;
    }

    nav a:hover {
      color: #93c5fd;
    }

    .back-btn {
      position: absolute;
      left: 20px;
      bottom: -35px;
      background: #1e3a8a;
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.3s;
    }

    .back-btn:hover {
      background: #1e40af;
    }

    .stream-options {
      padding: 70px 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 40px;
      max-width: 800px;
      margin: auto;
    }

    .stream-card {
      background: white;
      padding: 30px 25px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .stream-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.15);
    }

    .stream-card h3 {
      color: #1e3a8a;
      font-size: 1.3rem;
      margin-bottom: 12px;
    }

    .stream-card p {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 20px;
    }

    .stream-card a {
      display: inline-block;
      padding: 12px 25px;
      background: #2563eb;
      color: white;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.3s, transform 0.2s;
    }

    .stream-card a:hover {
      background: #1e40af;
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      .stream-options {
        grid-template-columns: 1fr;
      }
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #1e3a8a;
      color: white;
      margin-top: 50px;
    }
  </style>
    <!-- Global Dark Mode Support -->
    <style>
        body.dark-mode {
            background-color: #0f172a !important;
            color: #f1f5f9 !important;
        }
        body.dark-mode .glass-card, 
        body.dark-mode .app-header, 
        body.dark-mode .side-nav {
            background: rgba(30, 41, 59, 0.85) !important;
            border-color: rgba(51, 65, 85, 0.5) !important;
            color: #f1f5f9 !important;
        }
        body.dark-mode .side-nav ul li a {
            color: #f1f5f9 !important;
        }
        body.dark-mode .logo-text .light,
        body.dark-mode .welcome-card h2,
        body.dark-mode .section-title,
        body.dark-mode h1,
        body.dark-mode h2,
        body.dark-mode h3,
        body.dark-mode h4,
        body.dark-mode p,
        body.dark-mode span,
        body.dark-mode label,
        body.dark-mode strong {
            color: #cbd5e1 !important;
        }
        body.dark-mode .gradient-text,
        body.dark-mode .logo-text {
            color: #db2777 !important;
            background: none !important;
            -webkit-text-fill-color: #db2777 !important;
        }
        body.dark-mode input,
        body.dark-mode select,
        body.dark-mode textarea {
            background: rgba(15, 23, 42, 0.6) !important;
            color: #f1f5f9 !important;
            border-color: #334155 !important;
        }
    </style>
    <script>
        (function() {
            if (localStorage.getItem("appTheme") === "dark") {
                document.documentElement.classList.add("dark-mode");
                document.addEventListener("DOMContentLoaded", () => {
                    document.body.classList.add("dark-mode");
                });
            }
        })();
    </script>
</head>
<body>
  <header>
    <h1>Choose Your Biology Stream</h1>
    <a href="neet.html" class="back-btn">⬅ Back</a>
    <nav>
      <ul>
        <li><a href="neet.html">Home</a></li>
        <li><a href="../exam.html">Practice</a></li>
      </ul>
    </nav>
  </header>

  <section class="stream-options">
    <div class="stream-card">
      <h3>Zoology</h3>
      <p>Practice Zoology questions for the NEET stream.</p>
      <a href="neet-zoology.html">Start Zoology</a>
    </div>
    <div class="stream-card">
      <h3>Botany</h3>
      <p>Practice Botany questions for the NEET stream.</p>
      <a href="neet-botany.html">Start Botany</a>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Sharada Academy. All rights reserved.</p>
     <p style="margin-top: 10px; font-size: 0.9rem;">Made with ❤️ by Team Sharada</p>
  </footer>
</body>
</html>
