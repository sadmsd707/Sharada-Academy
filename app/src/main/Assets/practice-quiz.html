<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <title>Practice Quiz – Sharada Academy</title>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- MathJax Configuration & Loader -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script" async></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-left: env(safe-area-inset-left, 0px);
            --safe-area-right: env(safe-area-inset-right, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: #f8fafc;
            color: #475569;
            line-height: 1.6;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            padding-top: var(--safe-area-top);
            padding-bottom: var(--safe-area-bottom);
            padding-left: var(--safe-area-left);
            padding-right: var(--safe-area-right);
            position: relative;
        }

        #equations-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            z-index: 0;
            pointer-events: none;
            display: block;
            will-change: transform;
        }

        .content-layer {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
            width: 100%;
        }

        /* Header */
        .app-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(203, 213, 225, 0.4);
            height: 70px;
            gap: 12px;
        }

        .header-logo {
            display: flex;
            align-items: baseline;
            gap: 4px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .header-logo .logo-pink {
            color: #db2777;
        }

        .header-logo .logo-light {
            color: #94a3b8;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.04em;
        }

        .hamburger {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 28px;
            height: 20px;
            padding: 0;
            z-index: 1001;
            position: relative;
            transition: transform 0.2s ease;
        }

        .hamburger span {
            display: block;
            height: 3px;
            width: 100%;
            background-color: #db2777;
            border-radius: 3px;
            transition: all 0.3s ease;
            transform-origin: center;
        }

        .hamburger.active span:nth-child(1) {
            transform: translateY(8.5px) rotate(45deg);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }

        .hamburger.active span:nth-child(3) {
            transform: translateY(-8.5px) rotate(-45deg);
        }

        .hamburger:active {
            transform: scale(0.92);
        }

        .side-nav {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            height: 100dvh;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: -8px 0 32px rgba(0, 0, 0, 0.08);
            border-left: 1px solid rgba(203, 213, 225, 0.5);
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .side-nav.active {
            right: 0;
        }

        .side-nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
            overflow-y: auto;
            max-height: 100vh;
            max-height: 100dvh;
            padding-top: 80px;
            padding-bottom: 24px;
        }

        .side-nav ul li a {
            display: flex;
            align-items: center;
            gap: 14px;
            color: #1e293b;
            text-decoration: none;
            padding: 16px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-left: 4px solid transparent;
            transition: all 0.25s ease;
            background: transparent;
        }

        .side-nav ul li a:hover {
            background: rgba(219, 39, 119, 0.05);
            border-left-color: #db2777;
            color: #db2777;
            padding-left: 32px;
        }

        .nav-icon {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.35s ease;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Quiz Layout */
        .dashboard {
            padding: 24px 5vw 32px;
            max-width: 800px;
            margin: auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(203, 213, 225, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            padding: 28px 24px;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .quiz-title {
            font-weight: 800;
            font-size: 1.2rem;
            color: #1e293b;
        }

        .timer {
            background: #eff6ff;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            color: #1e40af;
        }

        .question-block {
            margin-bottom: 24px;
        }

        .q-num {
            font-weight: 700;
            color: #db2777;
            margin-bottom: 6px;
        }

        .q-text {
            font-size: 1rem;
            color: #0f172a;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .q-image {
            max-width: 100%;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            background: #fff;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            color: #1e293b;
        }

        .option-btn:hover {
            border-color: #db2777;
            background: #fdf2f8;
        }

        .option-btn.selected {
            border-color: #db2777;
            background: #fce7f3;
            font-weight: 600;
        }

        .option-letter {
            font-weight: 800;
            color: #db2777;
            width: 24px;
            flex-shrink: 0;
        }

        .option-img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(135deg, #db2777, #e11d48);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            box-shadow: 0 8px 24px rgba(219, 39, 119, 0.2);
            letter-spacing: 0.01em;
        }

        .btn:hover {
            box-shadow: 0 12px 28px rgba(219, 39, 119, 0.3);
            background: linear-gradient(135deg, #c71d6b, #d41a3f);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-outline {
            background: #fff;
            color: #db2777;
            border: 1.5px solid #db2777;
            box-shadow: none;
        }

        .btn-outline:hover {
            background: #fdf2f8;
        }

        .question-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 20px;
        }

        .q-bubble {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            border: 1.5px solid #e2e8f0;
            background: #f8fafc;
            transition: all 0.2s;
        }

        .q-bubble.current {
            border-color: #db2777;
            background: #fce7f3;
        }

        .q-bubble.answered {
            background: #dbeafe;
            border-color: #3b82f6;
            color: #1e40af;
        }

        .site-footer {
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            margin-top: auto;
            text-align: center;
            width: 100%;
            padding-bottom: 16px;
        }

        .site-footer .copyright {
            font-size: 0.875rem;
            font-weight: 700;
            color: #1e293b;
        }

        .site-footer .love {
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            font-weight: 700;
            margin-top: 4px;
        }

        /* Loading & Error */
        .loading-area {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #db2777;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width:600px) {
            .app-header {
                padding: 12px 18px;
                height: 62px;
            }

            .header-logo {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

    <div class="content-layer">

    <script>
        // ---------- Firebase Config ----------
        const firebaseConfig = {
            apiKey: "AIzaSyBXWEuA7G55nawfNUoIqr9PqGP9YGQwGnc",
            authDomain: "soham-6d886.firebaseapp.com",
            projectId: "soham-6d886",
            storageBucket: "soham-6d886.firebasestorage.app",
            messagingSenderId: "281780176229",
            appId: "1:281780176229:web:cd1eea7bd171c14a338d8c",
            measurementId: "G-CB1J6LQ7DJ"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ---------- Hamburger Menu ----------
        const hamburger = document.getElementById('hamburger');
        const sideNav = document.getElementById('sideNav');
        const overlay = document.getElementById('overlay');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            sideNav.classList.toggle('active');
            overlay.classList.toggle('active');
            document.body.style.overflow = sideNav.classList.contains('active') ? 'hidden' : 'auto';
        });
        overlay.addEventListener('click', () => {
            hamburger.classList.remove('active');
            sideNav.classList.remove('active');
            overlay.classList.remove('active');
            document.body.style.overflow = 'auto';
        });
        document.querySelectorAll('.side-nav a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                sideNav.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = 'auto';
            });
        });

        // ---------- Read URL Parameters ----------
        const urlParams = new URLSearchParams(window.location.search);
        const course = urlParams.get('course') || 'MHT CET';
        const subject = urlParams.get('subject') || 'Physics';
        const chapter = urlParams.get('chapter') || '';
        const topicsParam = urlParams.get('topics') || '';
        const topicNames = topicsParam ? topicsParam.split(',') : [];

        document.getElementById('quizTitle').textContent = `${course} · ${subject} · ${chapter}`;

        // ---------- Quiz State ----------
        let questions = [];
        let currentIndex = 0;
        let userAnswers = {};      // { index: answerLetter } for MCQ, or string for text
        let startTime = Date.now();
        let timerInterval;

        // ---------- Fetch Questions from Firestore ----------
        async function loadQuestions() {
            if (!chapter) {
                showError('Missing chapter. Please go back and select topics.');
                return;
            }
            try {
                let allQuestions = [];
                // Firestore can only '==' on one value per query; we loop over topics
                if (topicNames.length > 0) {
                    const promises = topicNames.map(topic =>
                        db.collection('practice_questions')
                            .where('course', '==', course)
                            .where('subject', '==', subject)
                            .where('chapter', '==', chapter)
                            .where('topic', '==', topic)
                            .get()
                    );
                    const snapshots = await Promise.all(promises);
                    snapshots.forEach(snap => {
                        snap.forEach(doc => allQuestions.push({ id: doc.id, ...doc.data() }));
                    });
                } else {
                    // If no specific topics, fetch all questions for the chapter
                    const snap = await db.collection('practice_questions')
                        .where('course', '==', course)
                        .where('subject', '==', subject)
                        .where('chapter', '==', chapter)
                        .get();
                    snap.forEach(doc => allQuestions.push({ id: doc.id, ...doc.data() }));
                }

                // Remove duplicates (if a question matches multiple selected topics)
                const uniqueMap = new Map();
                allQuestions.forEach(q => uniqueMap.set(q.id, q));
                questions = Array.from(uniqueMap.values());

                if (questions.length === 0) {
                    showError('No questions found for this selection. Please add some via the Practice Platform.');
                    return;
                }

                // Shuffle questions (optional)
                questions = questions.sort(() => Math.random() - 0.5);

                // Start quiz
                renderQuestion();
                startTimer();
            } catch (err) {
                console.error('Error loading questions:', err);
                showError('Failed to load questions. Check your connection and Firestore data.');
            }
        }

        function showError(msg) {
            document.getElementById('quizArea').innerHTML = `<p style="color:red; text-align:center; padding:40px;">${msg}</p>`;
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('prevBtn').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'none';
        }

        // ---------- Render Current Question ----------
        function renderQuestion() {
            if (questions.length === 0) return;
            const q = questions[currentIndex];
            const area = document.getElementById('quizArea');
            let html = `<div class="question-block">
                <div class="q-num">Question ${currentIndex + 1} of ${questions.length}</div>
                <div class="q-text">${escapeHtml(autoWrapMathInText(q.text))}</div>`;
            if (q.questionImage) {
                html += `<img src="${q.questionImage}" class="q-image" alt="Question image"/>`;
            }
            html += `<div class="options">`;
            if (q.type === 'mcq') {
                ['A', 'B', 'C', 'D'].forEach(letter => {
                    const opt = q.options?.[letter];
                    if (!opt) return; // skip if option missing
                    const selected = userAnswers[currentIndex] === letter ? ' selected' : '';
                    html += `<div class="option-btn${selected}" data-letter="${letter}">
                        <span class="option-letter">${letter}</span>`;
                    if (opt.image) html += `<img src="${opt.image}" class="option-img" alt="Option ${letter}"/>`;
                    html += `<span>${escapeHtml(autoWrapMathInText(opt.text))}</span></div>`;
                });
            } else {
                // Text answer
                html += `<input type="text" id="textAnswer" placeholder="Type your answer..." value="${escapeHtml(userAnswers[currentIndex] || '')}" style="width:100%; padding:12px; border-radius:8px; border:1.5px solid #e2e8f0; font-size:0.95rem;">`;
            }
            html += `</div></div>`;
            area.innerHTML = html;

            // Attach option click events for MCQ
            if (q.type === 'mcq') {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        userAnswers[currentIndex] = btn.dataset.letter;
                        updatePalette();
                    });
                });
            } else {
                document.getElementById('textAnswer')?.addEventListener('input', (e) => {
                    userAnswers[currentIndex] = e.target.value;
                    updatePalette();
                });
            }

            // Navigation buttons visibility
            document.getElementById('prevBtn').style.display = currentIndex === 0 ? 'none' : 'inline-flex';
            document.getElementById('nextBtn').style.display = currentIndex === questions.length - 1 ? 'none' : 'inline-flex';
            document.getElementById('submitBtn').style.display = currentIndex === questions.length - 1 ? 'inline-flex' : 'none';

            updatePalette();

            if (typeof MathJax !== 'undefined') {
                MathJax.typesetPromise([area]).catch(err => console.error(err));
            }
        }

        function updatePalette() {
            const palette = document.getElementById('palette');
            palette.innerHTML = '';
            questions.forEach((q, idx) => {
                const bubble = document.createElement('div');
                bubble.className = 'q-bubble';
                bubble.textContent = idx + 1;
                if (idx === currentIndex) bubble.classList.add('current');
                if (userAnswers[idx] !== undefined) bubble.classList.add('answered');
                bubble.addEventListener('click', () => {
                    currentIndex = idx;
                    renderQuestion();
                });
                palette.appendChild(bubble);
            });
        }

        // ---------- Timer ----------
        function startTimer() {
            let sec = 0, min = 0;
            const timerEl = document.getElementById('timer');
            timerInterval = setInterval(() => {
                sec++;
                if (sec === 60) { min++; sec = 0; }
                timerEl.textContent = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // ---------- Navigation ----------
        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentIndex > 0) { currentIndex--; renderQuestion(); }
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentIndex < questions.length - 1) { currentIndex++; renderQuestion(); }
        });

        // ---------- Submit ----------
        document.getElementById('submitBtn').addEventListener('click', () => {
            if (!confirm('Are you sure you want to submit?')) return;
            clearInterval(timerInterval);
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const timeStr = `${Math.floor(elapsed / 60)} min ${elapsed % 60} sec`;

            let correct = 0;
            const details = questions.map((q, idx) => {
                const userAns = userAnswers[idx] || 'Not Answered';
                let isCorrect = false;
                if (q.type === 'mcq') {
                    isCorrect = userAns === q.correctAnswer;
                } else {
                    // Simple case-insensitive comparison for text
                    const userClean = String(userAns).trim().toLowerCase();
                    const correctClean = String(q.correctAnswer).trim().toLowerCase();
                    isCorrect = userClean === correctClean;
                }
                if (isCorrect) correct++;

                return {
                    number: `Q.${idx + 1})`,
                    text: q.text,
                    options: q.options || null,
                    correctAnswer: q.correctAnswer,
                    userAns,
                    isCorrect,
                    questionImage: q.questionImage || null,
                    solutionText: q.solutionText || null,
                    solutionImage: q.solutionImage || null,
                };
            });

            const result = {
                course, subject, chapter, topics: topicNames,
                total: questions.length,
                correct,
                accuracy: ((correct / questions.length) * 100).toFixed(2),
                time: timeStr,
                timestamp: new Date().toISOString(),
                details
            };

            localStorage.setItem('quizResult', JSON.stringify(result));
            window.location.href = 'practice-result.html';   // adjust path if needed
        });

        // ---------- Helper ----------
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function autoWrapMathInText(text) {
            if (!text) return '';
            if (text.includes('\\(') || text.includes('\\[') || text.includes('$$')) {
                return text;
            }
            const latexPattern = /\\[a-zA-Z]+|[_^][{}]|[\{\}]/;
            if (latexPattern.test(text)) {
                return '\\(' + text + '\\)';
            }
            return text;
        }

        // ---------- Floating Equations Canvas (same as your other pages) ----------
        (function () {
            const canvas = document.getElementById('equations-canvas');
            const ctx = canvas.getContext('2d');
            let width, height, dpr = 2, particles = [];
            const expressions = [
                "E = mc²", "∫ x² dx", "∇ × B = μ₀J", "PV = nRT",
                "sin²θ + cos²θ = 1", "H₂O + CO₂ → C₆H₁₂O₆", "ΔG = ΔH - TΔS",
                "F = G(m₁m₂)/r²", "pH = -log[H⁺]", "DNA ⇌ RNA",
                "v = u + at", "C₆H₁₂O₆", "∑ F = ma", "lim (x→0) sin(x)/x = 1"
            ];

            class Particle {
                constructor() { this.reset(); this.y = Math.random() * window.innerHeight; }
                reset() {
                    this.text = expressions[Math.floor(Math.random() * expressions.length)];
                    this.x = Math.random() * window.innerWidth;
                    this.y = -60;
                    this.speed = 0.2 + Math.random() * 0.5;
                    this.size = 14 + Math.random() * 10;
                    this.opacity = 0.08 + Math.random() * 0.1;
                }
                update(sW, sH) {
                    this.y += this.speed;
                    if (this.y > sH + 60) {
                        this.reset();
                        this.y = -60;
                        this.x = Math.random() * sW;
                    }
                }
                draw(ctx) {
                    ctx.save();
                    ctx.fillStyle = `rgba(157,23,77,${this.opacity})`;
                    ctx.font = `bold ${this.size}px 'Courier New', monospace`;
                    ctx.fillText(this.text, this.x, this.y);
                    ctx.restore();
                }
            }

            function resize() {
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                width = canvas.width = window.innerWidth * dpr;
                height = canvas.height = window.innerHeight * dpr;
                canvas.style.width = window.innerWidth + 'px';
                canvas.style.height = window.innerHeight + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
            }
            window.addEventListener('resize', resize);
            resize();

            for (let i = 0; i < 30; i++) particles.push(new Particle());

            function animate() {
                const w = window.innerWidth, h = window.innerHeight;
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update(w, h); p.draw(ctx); });
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // Kick off quiz loading
        loadQuestions();
    </script>
</body>
