<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Login - Soham</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e0f2fe, #f0f9ff);
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #2563eb;
      color: white;
      padding: 15px 40px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: bold;
    }

    .login-container {
      max-width: 400px;
      margin: 80px auto;
      background: white;
      padding: 40px 30px;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
      flex-grow: 1;
    }

    .login-container h2 {
      color: #2563eb;
      margin-bottom: 25px;
      font-size: 1.6rem;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #1e40af;
      font-size: 1rem;
    }

    .login-container input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .login-container input:focus {
      border: 1px solid #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 15px;
      transition: background 0.3s;
    }

    .login-btn:hover {
      background: #1e40af;
    }

    .info-text {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 20px;
      text-align: center;
    }

    .back-link {
      display: inline-block;
      color: #2563eb;
      text-decoration: none;
      margin-top: 15px;
      font-size: 0.9rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    footer {
      padding: 20px;
      text-align: center;
      background: #2563eb;
      color: white;
      font-size: 0.9rem;
      margin-top: auto;
    }

    .teacher-icon {
      font-size: 3rem;
      margin-bottom: 15px;
      color: #2563eb;
    }

    .validation-message {
      font-size: 0.8rem;
      margin-top: 5px;
      color: #6b7280;
      display: none;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .error-message {
      background: #fee2e2;
      border: 1px solid #ef4444;
      color: #b91c1c;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: #dcfce7;
      border: 1px solid #10b981;
      color: #065f46;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    /* Loading overlay */
    #loadingOverlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.9);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
    }

    #loadingOverlay.show {
      display: flex;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Teacher Portal</h1>
  </header>

  <div id="loadingOverlay">
    <div class="spinner"></div>
    <div>Signing in...</div>
  </div>

  <div class="login-container">
    <div class="teacher-icon">👨‍🏫</div>
    <h2>Teacher Login</h2>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required />
        <div id="emailMessage" class="validation-message"></div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />
        <div id="passwordMessage" class="validation-message"></div>
      </div>

      <button type="submit" class="login-btn" id="loginButton">Login</button>
    </form>

    <a href="../role-selection.html" class="back-link">← Back to Role Selection</a>

    <p class="info-text">Please contact administration if you've forgotten your credentials</p>
  </div>

  <footer>
    <p>&copy; 2026 Soham Educational Institute. All rights reserved.</p>
    <p style="margin-top: 10px; font-size: 0.9rem;">Made with ❤️ by Team Soham</p>
  </footer>

  <script>
    // ---------- Firebase Configuration ----------
    // !! Replace with your own Firebase project config !!
    const firebaseConfig = {
      apiKey: "AIzaSyBXWEuA7G55nawfNUoIqr9PqGP9YGQwGnc",
      authDomain: "soham-6d886.firebaseapp.com",
      projectId: "soham-6d886",
      storageBucket: "soham-6d886.firebasestorage.app",
      messagingSenderId: "281780176229",
      appId: "1:281780176229:web:cd1eea7bd171c14a338d8c",
      measurementId: "G-CB1J6LQ7DJ"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const form = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginButton = document.getElementById("loginButton");
    const emailMessage = document.getElementById("emailMessage");
    const passwordMessage = document.getElementById("passwordMessage");
    const errorMessage = document.getElementById("errorMessage");
    const successMessage = document.getElementById("successMessage");
    const loadingOverlay = document.getElementById("loadingOverlay");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      // Reset messages
      emailMessage.style.display = "none";
      passwordMessage.style.display = "none";
      errorMessage.classList.remove("show");
      successMessage.classList.remove("show");

      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      // Basic validation
      let isValid = true;
      if (!email) {
        emailMessage.textContent = "Please enter your email";
        emailMessage.style.display = "block";
        emailMessage.style.color = "#dc2626";
        isValid = false;
      } else if (!/\S+@\S+\.\S+/.test(email)) {
        emailMessage.textContent = "Please enter a valid email address";
        emailMessage.style.display = "block";
        emailMessage.style.color = "#dc2626";
        isValid = false;
      }
      if (!password) {
        passwordMessage.textContent = "Please enter your password";
        passwordMessage.style.display = "block";
        passwordMessage.style.color = "#dc2626";
        isValid = false;
      }
      if (!isValid) return;

      // Check role selection (still from localStorage as a convenience)
      const userRole = localStorage.getItem("userRole");
      if (userRole !== "teacher") {
        errorMessage.textContent = "Please select teacher role first from the role selection page.";
        errorMessage.classList.add("show");
        return;
      }

      // Show loading overlay
      loadingOverlay.classList.add("show");
      loginButton.disabled = true;

      try {
        // Sign in with Firebase Auth
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // Verify teacher role in Firestore
        const teacherDoc = await db.collection("teachers").doc(user.uid).get();
        if (!teacherDoc.exists || teacherDoc.data().role !== "teacher") {
          // Not a teacher – sign out and show error
          await auth.signOut();
          throw new Error("not_teacher");
        }

        // Successful login
        const teacherData = teacherDoc.data();
        localStorage.setItem("currentTeacher", JSON.stringify({
          uid: user.uid,
          email: user.email,
          name: teacherData.name || "Teacher",
          role: "teacher",
          loginTime: new Date().toISOString()
        }));
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("username", teacherData.name || user.email);
        localStorage.setItem("userRole", "teacher");

        successMessage.textContent = "Login successful! Redirecting...";
        successMessage.classList.add("show");

        // Redirect to teacher dashboard
        setTimeout(() => {
          window.location.href = "teacher-dashboard.html";
        }, 1000);

      } catch (error) {
        loadingOverlay.classList.remove("show");
        loginButton.disabled = false;

        // Handle specific errors
        if (error.code === "auth/user-not-found" || error.code === "auth/wrong-password") {
          errorMessage.textContent = "Invalid email or password.";
        } else if (error.code === "auth/invalid-email") {
          errorMessage.textContent = "Please enter a valid email address.";
        } else if (error.message === "not_teacher") {
          errorMessage.textContent = "Your account is not registered as a teacher. Please contact the administrator.";
        } else {
          errorMessage.textContent = "Login failed: " + error.message;
        }
        errorMessage.classList.add("show");

        // Shake animation
        form.style.animation = "shake 0.5s";
        setTimeout(() => {
          form.style.animation = "";
        }, 500);
      }
    });

    // Clear validation messages when typing
    emailInput.addEventListener('input', () => {
      emailMessage.style.display = "none";
      errorMessage.classList.remove("show");
    });
    passwordInput.addEventListener('input', () => {
      passwordMessage.style.display = "none";
      errorMessage.classList.remove("show");
    });

    // On page load, check role selection
    document.addEventListener('DOMContentLoaded', function () {
      const userRole = localStorage.getItem("userRole");
      if (userRole !== "teacher") {
        errorMessage.textContent = "Please select 'Teacher' role from the role selection page.";
        errorMessage.classList.add("show");
        loginButton.disabled = true;
        setTimeout(() => {
          window.location.href = "../role-selection.html";
        }, 3000);
      }
    });

    // Add shake animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
        20%, 40%, 60%, 80% { transform: translateX(5px); }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>

</html>
